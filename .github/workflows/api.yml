name: API CI

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/api.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/api.yml"

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck shared
        run: pnpm --filter @quickroutesai/shared typecheck

      - name: Typecheck API
        run: pnpm --filter api typecheck

      - name: Run tests
        run: pnpm --filter api test -- --ci --passWithNoTests
